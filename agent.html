<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Agent Desk — HooiserHyperdrive Civic Engagement Desk</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-slate-100 min-h-screen">

<header class="brand-bar">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-2xl">🎧</span>
      <div>
        <div class="font-semibold leading-tight">HooiserHyperdrive Civic Engagement Desk</div>
        <div class="text-xs opacity-80">Agent Desk · <span class="pulse-dot"></span> Live</div>
      </div>
    </div>
    <div class="flex items-center gap-3 text-sm">
      <span class="opacity-80">Signed in as</span>
      <select id="agentSelect" class="bg-white border border-slate-300 rounded px-3 py-1.5 text-slate-900 font-medium"></select>
      <a href="index.html" class="underline opacity-90 hover:opacity-100">Switch role</a>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-5 space-y-5">

  <!-- Lookup bar -->
  <section class="card p-4">
    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Citizen lookup</label>
    <div class="flex flex-wrap gap-2">
      <input id="lookup" type="text" placeholder="Phone, email, citizen ID, or name…"
             class="flex-1 min-w-[260px] border border-slate-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-300 outline-none" />
      <button id="lookupBtn" class="bg-blue-700 text-white px-4 py-2 rounded hover:bg-blue-800">Search</button>
      <select id="quickPick" class="bg-white border border-slate-300 rounded px-3 py-2 text-sm text-slate-900 font-medium">
        <option value="">Quick pick…</option>
      </select>
    </div>
    <div id="lookupMsg" class="text-sm text-rose-600 mt-2 hidden"></div>
  </section>

  <!-- Citizen profile (hidden until found) -->
  <section id="profile" class="hidden space-y-5">

    <!-- Header card -->
    <div class="card p-5 fade-in">
      <div class="flex flex-wrap items-start justify-between gap-4">
        <div>
          <div class="flex items-center gap-3">
            <h1 id="cName" class="text-2xl font-bold text-slate-900"></h1>
            <span id="cTier" class="tier-badge"></span>
          </div>
          <div class="text-sm text-slate-500 mt-1">
            <span id="cId"></span> · <span id="cPhone"></span> · <span id="cEmail"></span> · <span id="cDistrict"></span> · <span id="cLang"></span>
          </div>
        </div>
        <div class="text-right">
          <div class="text-xs text-slate-500">Loyalty points</div>
          <div id="cPoints" class="text-3xl font-bold" style="color:var(--brand)"></div>
          <div id="cProgress" class="text-xs text-slate-500 mt-1"></div>
        </div>
      </div>

      <!-- AI milestone banner -->
      <div id="milestoneBanner" class="mt-4 rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm">
        <div class="flex items-start gap-2">
          <span class="text-lg">🎉</span>
          <div class="flex-1">
            <div class="font-semibold text-amber-900">Suggested talking point</div>
            <div id="milestoneText" class="text-amber-800"></div>
          </div>
          <button id="dismissMilestone" class="text-xs text-amber-700 hover:underline">Dismiss</button>
        </div>
      </div>
    </div>

    <div class="grid lg:grid-cols-3 gap-5">

      <!-- Left: AI recommendations -->
      <div class="lg:col-span-2 space-y-5">
        <section class="card p-5">
          <div class="flex items-center justify-between mb-3">
            <h2 class="font-semibold text-slate-900 flex items-center gap-2">
              ✨ AI next-best actions
              <span id="aiSource" class="text-xs font-normal text-slate-500"></span>
            </h2>
            <button id="refreshRecs" class="text-xs text-blue-700 hover:underline">Refresh</button>
          </div>
          <div id="recList" class="space-y-3"></div>
        </section>

        <!-- Engagement timeline -->
        <section class="card p-5">
          <div class="flex items-center justify-between mb-3">
            <h2 class="font-semibold text-slate-900">Engagement timeline</h2>
            <select id="historyFilter" class="text-sm border border-slate-300 rounded px-2 py-1 text-slate-900 bg-white font-medium">
              <option value="all">All channels</option>
              <option value="online">Online</option>
              <option value="in-person">In-person</option>
              <option value="post-call">Post-call</option>
            </select>
          </div>
          <div id="historyList" class="divide-y divide-slate-100"></div>
        </section>
      </div>

      <!-- Right: Cases / KB / Actions -->
      <div class="space-y-5">
        <section class="card p-5">
          <h2 class="font-semibold text-slate-900 mb-3">Open cases</h2>
          <div id="openCases" class="text-sm"></div>
          <button id="closeCaseBtn" class="hidden mt-3 w-full bg-emerald-700 text-white text-sm py-2 rounded hover:bg-emerald-800">Close top case &amp; request rating</button>
        </section>

        <section class="card p-5">
          <h2 class="font-semibold text-slate-900 mb-3">📚 Knowledge base</h2>
          <input id="kbQuery" placeholder="Search KB (e.g., 'pothole', 'recycling')"
                 class="w-full border border-slate-300 rounded px-3 py-2 text-sm mb-2" />
          <div id="kbResults" class="space-y-2 text-sm"></div>
        </section>

        <section class="card p-5">
          <h2 class="font-semibold text-slate-900 mb-3">Quick actions</h2>
          <div class="grid grid-cols-2 gap-2">
            <button id="actEnrollAll" class="text-xs bg-slate-800 text-white py-2 rounded hover:bg-slate-900">Enroll top rec</button>
            <button id="actEscalate"  class="text-xs bg-rose-700 text-white py-2 rounded hover:bg-rose-800">Escalate to supervisor</button>
            <button id="actThank"     class="text-xs bg-amber-600 text-white py-2 rounded hover:bg-amber-700">Send thank-you</button>
            <button id="actNote"      class="text-xs bg-slate-200 text-slate-800 py-2 rounded hover:bg-slate-300">Add note</button>
          </div>
          <div id="actionMsg" class="text-xs text-emerald-700 mt-2"></div>
        </section>
      </div>
    </div>
  </section>

  <footer class="text-center text-xs text-slate-400 py-4">
    Demo data only · <a href="#" id="resetDemo" class="underline hover:text-slate-600">Reset demo</a>
  </footer>
</main>

<script src="js/data.js"></script>
<script src="js/ai.js"></script>
<script>
const state = SCED.Store.load();
let currentAgent = state.agents[0].id;
let currentCitizen = null;

function tierClass(name) { return "tier-" + name.replace(/\s+/g, "-"); }

function initAgents() {
  const sel = document.getElementById("agentSelect");
  sel.innerHTML = state.agents.map(a => `<option value="${a.id}">${a.name} · ${a.region}</option>`).join("");
  sel.onchange = () => currentAgent = sel.value;
}
function initQuickPick() {
  const sel = document.getElementById("quickPick");
  sel.innerHTML += state.citizens.map(c => `<option value="${c.id}">${c.name} · ${c.tier}</option>`).join("");
  sel.onchange = () => { if (sel.value) doLookup(sel.value); };
}

function doLookup(q) {
  const msg = document.getElementById("lookupMsg");
  msg.classList.add("hidden");
  const c = SCED.findCitizen(state, q);
  if (!c) {
    msg.textContent = `No match for "${q}". You can create a new citizen record.`;
    msg.classList.remove("hidden");
    document.getElementById("profile").classList.add("hidden");
    return;
  }
  currentCitizen = c;
  document.getElementById("profile").classList.remove("hidden");
  renderProfile();
}

function renderProfile() {
  const c = currentCitizen;
  document.getElementById("cName").textContent = c.name;
  document.getElementById("cId").textContent = c.id;
  document.getElementById("cPhone").textContent = c.phone;
  document.getElementById("cEmail").textContent = c.email;
  document.getElementById("cDistrict").textContent = c.district;
  document.getElementById("cLang").textContent = "lang: " + c.language.toUpperCase();
  document.getElementById("cPoints").textContent = c.points.toLocaleString();
  const tBadge = document.getElementById("cTier");
  tBadge.className = "tier-badge " + tierClass(c.tier);
  tBadge.textContent = `${SCED.tierFor(c.points, state.tiers).icon} ${c.tier}`;
  const prog = SCED.tierProgress(c.points, state.tiers);
  document.getElementById("cProgress").textContent = prog.next
    ? `${prog.toNext.toLocaleString()} pts to ${prog.next.name} (${prog.pct}%)`
    : "Top tier achieved";

  // Milestone
  const m = SCED_AI.milestoneScript(c);
  document.getElementById("milestoneText").textContent = m.text;

  renderHistory();
  renderCases();
  renderRecs();
  renderKB();
}

function renderHistory() {
  const filter = document.getElementById("historyFilter").value;
  const items = currentCitizen.history.filter(h => filter === "all" || h.channel === filter);
  const el = document.getElementById("historyList");
  el.innerHTML = items.length === 0
    ? `<div class="text-sm text-slate-400 py-3">No activity for this filter.</div>`
    : items.slice(0, 15).map(h => `
      <div class="py-2 flex items-center justify-between text-sm">
        <div>
          <div class="font-medium text-slate-800">${h.action}</div>
          <div class="text-xs text-slate-500">${SCED.fmtDate(h.date)} · ${h.channel}</div>
        </div>
        <div class="font-semibold ${h.points>0?'text-emerald-700':'text-slate-400'}">${h.points>0?"+"+h.points:"—"}</div>
      </div>`).join("");
}

function renderCases() {
  const el = document.getElementById("openCases");
  const cases = currentCitizen.openCases || [];
  document.getElementById("closeCaseBtn").classList.toggle("hidden", cases.length === 0);
  el.innerHTML = cases.length === 0
    ? `<span class="text-slate-400">No open cases.</span>`
    : cases.map(cs => `
      <div class="border border-slate-200 rounded p-2 mb-2">
        <div class="flex justify-between text-xs text-slate-500"><span>${cs.id}</span><span>${cs.status} · ${cs.priority}</span></div>
        <div class="text-sm">${cs.subject}</div>
        <div class="text-xs text-slate-400">Opened ${SCED.fmtDate(cs.opened)}</div>
      </div>`).join("");
}

let lastRecs = [];
async function renderRecs() {
  const el = document.getElementById("recList");
  el.innerHTML = `<div class="text-sm text-slate-400">Generating recommendations…</div>`;
  const { recs, fallback } = await SCED_AI.recommend(currentCitizen, state.programs, state.tiers);
  lastRecs = recs;
  document.getElementById("aiSource").textContent =
    fallback ? "(fallback: AI unavailable)" : (window.SCED_OPENAI_KEY ? "(AI enhanced)" : "(rule-based)");
  el.innerHTML = recs.map((r, i) => `
    <div class="border border-slate-200 rounded-lg p-3 flex flex-wrap items-center gap-3 justify-between ${i===0?'ring-2 ring-emerald-200':''}">
      <div class="flex-1 min-w-[260px]">
        <div class="flex items-center gap-2">
          <div class="font-semibold text-slate-900">${r.title}</div>
          ${i===0?'<span class="text-[10px] uppercase tracking-wide bg-emerald-700 text-white px-1.5 py-0.5 rounded">Top pick</span>':''}
        </div>
        <div class="text-xs text-slate-500 mt-0.5">${SCED.fmtDate(r.date)} · ${r.location} · confidence ${(r.confidence*100|0)}%</div>
        <div class="text-sm text-slate-700 mt-1">${r.rationale}</div>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs bg-emerald-50 text-emerald-700 px-2 py-1 rounded">+${r.points} pts</span>
        <button data-id="${r.id}" class="enrollBtn bg-blue-700 text-white text-sm px-3 py-1.5 rounded hover:bg-blue-800">Enroll</button>
        <button data-id="${r.id}" data-vote="up"   class="voteBtn text-slate-400 hover:text-emerald-600" title="Helpful">👍</button>
        <button data-id="${r.id}" data-vote="down" class="voteBtn text-slate-400 hover:text-rose-600"   title="Not helpful">👎</button>
      </div>
    </div>`).join("");
  document.querySelectorAll(".enrollBtn").forEach(b => b.onclick = () => enroll(b.dataset.id));
  document.querySelectorAll(".voteBtn").forEach(b => b.onclick = () => {
    flash(`Feedback recorded (${b.dataset.vote === 'up' ? '👍' : '👎'}) for rec ${b.dataset.id}`);
  });
}

function enroll(programId) {
  const res = SCED.awardPoints(state, currentCitizen.id, programId, "agent-enroll");
  if (!res.ok) { flash("Could not enroll: " + res.reason, true); return; }
  // refresh from store
  currentCitizen = state.citizens.find(c => c.id === currentCitizen.id);
  renderProfile();
  flash(`Enrolled in "${res.program.title}" (+${res.program.points} pts).`);
}

function renderKB() {
  const q = document.getElementById("kbQuery").value;
  const res = SCED_AI.searchKB(state.kb, q);
  const el = document.getElementById("kbResults");
  if (!q.trim()) { el.innerHTML = `<div class="text-slate-400">Type a term to search the KB.</div>`; return; }
  if (res.length === 0) { el.innerHTML = `<div class="text-slate-400">No matching articles.</div>`; return; }
  el.innerHTML = res.map(a => `
    <div class="border border-slate-200 rounded p-2">
      <div class="font-medium text-slate-800">${a.title}</div>
      <div class="text-xs text-slate-500">Updated ${SCED.fmtDate(a.updated)} · score ${a.score}</div>
      <div class="text-slate-600 mt-1">${a.snippet}</div>
      <button class="text-xs text-blue-700 hover:underline mt-1" onclick="flash('Article &quot;${a.title}&quot; sent to ${currentCitizen.name} via email.')">Send to citizen</button>
    </div>`).join("");
}

function flash(text, isError) {
  const el = document.getElementById("actionMsg");
  el.textContent = text;
  el.className = "text-xs mt-2 " + (isError ? "text-rose-700" : "text-emerald-700");
  clearTimeout(flash._t);
  flash._t = setTimeout(() => { el.textContent = ""; }, 3500);
}

// SMS thank-you utility (hardcoded, no API required)
async function sendSMSThankYou(citizenName, phoneNumber) {
  const message = `Hello ${citizenName}! Thank you for your engagement with HooiserHyperdrive. We appreciate your participation in making our community better. - Civic Engagement Team`;
  
  // Store SMS in localStorage for audit trail
  const smsLog = JSON.parse(localStorage.getItem('smsLog') || '[]');
  smsLog.push({
    to: phoneNumber,
    citizen: citizenName,
    message: message,
    sentAt: new Date().toISOString(),
    status: 'sent'
  });
  localStorage.setItem('smsLog', JSON.stringify(smsLog));
  
  // Log to console for visibility
  console.log(`[SMS SENT] ${new Date().toLocaleTimeString()}`);
  console.log(`  To: ${phoneNumber} (${citizenName})`);
  console.log(`  Message: ${message}`);
  
  return { ok: true };
}

// Wire up controls
document.getElementById("lookupBtn").onclick = () => doLookup(document.getElementById("lookup").value);
document.getElementById("lookup").addEventListener("keydown", e => { if (e.key === "Enter") doLookup(e.target.value); });
document.getElementById("refreshRecs").onclick = () => renderRecs();
document.getElementById("historyFilter").onchange = () => renderHistory();
document.getElementById("kbQuery").addEventListener("input", renderKB);
document.getElementById("dismissMilestone").onclick = () => document.getElementById("milestoneBanner").classList.add("hidden");
document.getElementById("actEnrollAll").onclick = () => { if (lastRecs[0]) enroll(lastRecs[0].id); };
document.getElementById("actEscalate").onclick = () => flash(`Escalated to supervisor (${currentCitizen.tier} tier — priority queue).`);
document.getElementById("actThank").onclick = async () => {
  const smsResult = await sendSMSThankYou(currentCitizen.name, currentCitizen.phone);
  if (smsResult.ok) {
    flash(`Thank-you message sent to ${currentCitizen.name} via SMS to ${currentCitizen.phone}.`);
  } else {
    flash(`Thank-you message shown, but SMS send failed: ${smsResult.error}`, true);
  }
};
document.getElementById("actNote").onclick = () => {
  const note = prompt("Add note (saved to case):");
  if (note) flash("Note saved to case.");
};
document.getElementById("closeCaseBtn").onclick = () => {
  const cs = currentCitizen.openCases.shift();
  if (!cs) return;
  SCED.Store.save(state);
  // Add a new "post-case" interaction so the citizen rating panel works
  state.recentInteractions.unshift({
    id: "INT-" + Date.now(), agentId: currentAgent, citizenId: currentCitizen.id,
    date: new Date().toISOString().slice(0,10), channel: "post-case", csat: null, comment: ""
  });
  SCED.Store.save(state);
  renderProfile();
  flash(`Case ${cs.id} closed. Rating prompt sent to ${currentCitizen.name}.`);
};
document.getElementById("resetDemo").onclick = (e) => { e.preventDefault(); SCED.Store.reset(); location.reload(); };

initAgents();
initQuickPick();
// Demo: auto-load Aisha (Gold) so the demo opens with a rich profile
doLookup("C-Gold-001");
</script>
</body>
</html>
